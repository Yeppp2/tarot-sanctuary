name: Feature request
description: 提出一个新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢建议。请尽量说明使用场景，而不只是描述按钮或页面。
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 这个建议是为了解决什么体验问题？
      placeholder: 例如：用户不知道该选择哪个牌阵，希望系统能推荐。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望它怎么工作？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他想法
      description: 有没有考虑过其他实现方式？
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 可以附参考截图或链接。
    validations:
      required: false
